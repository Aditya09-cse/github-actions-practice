name: Run Real Tests in CI

on:
  workflow_dispatch:
  
jobs:
  test-ci:
    runs-on: ubuntu-latest
  
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: install dependencies
        run: pip install -r requirements.txt
      
      - name: run script
        run:  python scripts/system_health.py