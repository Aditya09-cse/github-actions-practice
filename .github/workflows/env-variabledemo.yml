name: ENV Variable Demo

on:
  workflow_dispatch:
  # workflow level env variable
env:
  APP_NAME: myapp
  
jobs:
    demo-job:
      runs-on: ubuntu-latest
      # job level env variable
      env:
        ENVIRONMENT: staging
      
      steps:
        - name: Print env varible 
          env: 
            VERSION: 1.0.0
          run: |
            echo "App Name: $APP_NAME"
            echo "Environment: $ENVIRONMENT"
            echo "Version: $VERSION"
