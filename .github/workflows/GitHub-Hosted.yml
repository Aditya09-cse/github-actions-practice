name: GitHub-Hosted YAML

on:
  workflow_dispatch:
    
  #push:
   # branches:
    #  - main

jobs:
  ubuntu_job:
    runs-on: ubuntu-latest

    steps:
      - name: print os name
        run: echo $RUNNER_OS
      
      - name: print the runners hostname
        run: hostname

      - name: print the current user running the job
        run: echo $USER 

      - name: print the tool versions of (docker,python,node,git)
        run:  docker --version && git --version && python --version && node --version

  windows_job:
    runs-on: windows-latest

    steps:
      - name: print os name
        run: echo %RUNNER_OS%
      
      - name: print the runners hostname
        run: hostname 

      - name: print the current user running the job
        run: echo  %USERNAME%

  mac_job:
    runs-on: macos-latest

    steps:
      - name: print os name
        run: echo $RUNNER_OS
      
      - name: print the runners hostname
        run: hostname

      - name: print the current user running the job
        run: echo $USER
