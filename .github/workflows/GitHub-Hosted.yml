name: GitHub-Hosted YAML

on:
  push:
    branches:
      - main

jobs:
  ubuntu_job:
    runs-on: ubuntu-latest

    steps:
      - name: print os name
        run: echo $RUNNER_OS
      
      - name: print the runners hostname
        run: hostname

      - name: print the current user running the job
        run: echo $USER 

  windows_job:
    runs-on: windows-latest

    steps:
      - name: print os name
        run: echo %RUNNER_OS%
      
      - name: print the runners hostname
        run: hostname 

      - name: print the current user running the job
        run: echo  %USERNAME%

  mac_job:
    runs-on: macos-latest

    steps:
      - name: print os name
        run: echo $RUNNER_OS
      
      - name: print the runners hostname
        run: hostname

      - name: print the current user running the job
        run: echo $USER
