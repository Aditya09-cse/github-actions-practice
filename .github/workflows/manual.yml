name: Manual trigger  for workflow

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Enter the environment (staging/production)"
        required: true
        default: "staging"
    
jobs:
  manual-trigger:
    runs-on: ubuntu-latest

    steps:
      - name: print the environment
        env:
          ENV_NAME: ${{ github.event.inputs.environment }}
        run: |
          echo Environment selected: $ENV_NAME