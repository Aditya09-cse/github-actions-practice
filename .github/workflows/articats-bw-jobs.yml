name:  Download Artifacts Between Jobs

on:
  workflow_dispatch:

jobs:
  generate-file:
    runs-on: ubuntu-latest

    steps:
      - name: create a file 
        run: |  
          mkdir report
          echo "test case passed" > report/report.txt

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: report.txt
          path: report/report.txt

  download-file:
    runs-on: ubuntu-latest
    needs: [generate-file]

    steps:
      - name: download file 
        uses: actions/download-artifact@v4
        with:
          name: report.txt

      - name: print report.txt
        run: cat report.txt