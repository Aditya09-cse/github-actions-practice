name: Smart Pipeline 

on:
  #push:
  
  workflow_dispatch:
   
jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4
          
      - name: setup python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: install dependemcies
        run: pip install -r requirements.txt
          
      - name: run linter
        run: flake8 app.py

  test:
    runs-on: ubuntu-latest

    steps:
      - name: testing
        run: echo "testing.."

  summary:
    runs-on: ubuntu-latest
    needs:  [lint, test]

    steps:
      - name: print branch name &  commit
        run: |
          echo "branch name:" ${{ github.ref_name }}
          echo "commit message:" ${{ github.event.commit[0].message}}

          if [ "${{ github.ref_name }}" = "main" ]; then
          echo "this push is for main branch"
          else
            echo "this push is for Feature branch"
          fi
