name: Docker build & push

on:
  workflow_dispatch:
    
  #push:
   # branches:
    #  - main

jobs:
  build-and-push:
    runs-on: ubuntu latest

    steps:

        - name: code checkout
          uses: actions/checkout@v4
        
        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ vars.DOCKERHUB_USER }}
            password: ${{ secrets.DOCKERHUB_PASSWORD }}
        
        - name: Build and push to docker hub
          uses: docker/build-push-action@v6
          with:
            push: true
            tags: |
              ${{ vars.DOCKERHUB_USER}}/github-actions-practice:${{github.ref}} # output -> aditya0910/github-action-practice:main
              ${{ vars.DOCKERHUB_USER}}/github-action-practice:latest
              ${{ vars.DOCKERHUB_USER}}/github-actions-practice:${{ vars.GITHUB_SHA}}