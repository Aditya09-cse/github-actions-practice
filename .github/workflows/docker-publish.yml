name: Docker Publish

on:
  push:
    branches:
       - main

jobs:
  dokcer-push:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4
      
      - name: login to docker hub
        uses: docker/login-action@v3
        with:
            username: ${{ vars.DOCKERHUB_USER }}
            password: ${{ secrets.DOCKERHUB_PASSWORD }}
        


  