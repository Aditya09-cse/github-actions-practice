name: Docker Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker-push:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4
      
      - name: build & tag
        uses: docker/build-push-action@v5
        with:
          context: ./flask-task-manager
          push: false
          tags: flask-task-manager:latest
      
      - name: login to docker hub
        uses: docker/login-action@v3
        with:
            username: ${{ secrets.DOCKERHUB_USER }}
            password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: set short sha using slice
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> GITHUB_ENV

      - name: tag & push only on main branch
        if: github.ref == 'main'
        uses: docker/build-push-action@v6
        with:
          context: ./flask-task-manager
          push: true
          tags: | 
            ${{ secrets.DOCKERHUB_USER }}/flask-task-manager:latest
            ${{ secrets.DOCKERHUB_USER }}/flask-task-manager:latest-${{env.SHORT_SHA}}
        
        


  