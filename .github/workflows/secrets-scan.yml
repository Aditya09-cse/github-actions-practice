# API Keys, sensitive data, credentials
# by a GitLeaks
name: Secrets Scan

on:
  workflow_call:
    
jobs:
  secrets-scan:
    runs-on: ubuntu-latest
  
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Runs GitLeaks Scanner
        uses: gitleaks/gitleaks-action@v2
        env: 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # github action manages it