name: Caller Workflow

on:
 # push:
  #  branches:
  #    - main
  workflow_dispatch:
jobs:
    build:
        uses: ./.github/workflows/reusable-build.yml
        with:
            app_name: "my-web-app"
            environment: "production"
        secrets:
            docker_token: ${{ secrets.DOCKER_TOKEN }}
    
    print-version:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: print the build version from reusable workflow
              run: echo "Resuable workflow version is ${{ needs.build.outputs.build_version }}"  