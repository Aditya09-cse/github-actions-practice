name: Image Scannner

on:
  workflow_call:
    
jobs:
  imager-scaneer:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
            username: ${{ vars.DOCKERHUB_USER }}
            password: ${{ secrets.DOCKERHUB_PASSWORD }}
      
      - name: trivy scanner
        uses: aquasecurity/trivy-action@v0
        with:
          severity: 'CRITICAL'
          exit-code: '1'
